name: GoalWatch - Send Test Notification

on:
  workflow_dispatch:
    inputs:
      monitor_id:
        description: "Monitor ID to test"
        required: true
      platform:
        description: "Platform to test (discord/telegram/slack/custom_webhook)"
        required: true

jobs:
  send-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send test notification
        env:
          MONITOR_ID: ${{ inputs.monitor_id }}
          PLATFORM: ${{ inputs.platform }}
        run: node scripts/send-test.js
