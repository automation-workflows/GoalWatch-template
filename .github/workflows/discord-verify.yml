name: Discord Verify

on:
  workflow_dispatch:
    inputs:
      monitor_id:
        description: "Monitor ID"
        required: true
      user_id:
        description: "Discord User ID"
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure monitors.json exists
        run: |
          test -f monitors.json || echo "[]" > monitors.json

      - name: Send Discord test message
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_USER_ID: ${{ inputs.user_id }}
          MONITOR_ID: ${{ inputs.monitor_id }}
        run: node scripts/discord-verify.js

      - name: Commit changes if any
        run: |
          git config user.name "GoalWatch Bot"
          git config user.email "goalwatch-bot@users.noreply.github.com"
          git add monitors.json
          git diff --staged --quiet || git commit -m "chore: discord verify update [skip ci]"
          git push
