name: GoalWatch - Add / Update Monitor

on:
  workflow_dispatch:
    inputs:
      action:
        description: "add | verify | deactivate"
        required: true
        default: "add"
      payload:
        description: "JSON payload"
        required: true

jobs:
  update-monitors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure data files exist
        run: |
          test -f monitors.json || echo "[]" > monitors.json

      - name: Process action
        env:
          ACTION: ${{ inputs.action }}
          PAYLOAD: ${{ inputs.payload }}
        run: |
          node -e "
          const fs = require('fs');
          const action = process.env.ACTION;
          const payload = JSON.parse(process.env.PAYLOAD);
          const monitors = JSON.parse(fs.readFileSync('monitors.json', 'utf8'));

          if (action === 'add') {
            const existingIndex = monitors.findIndex(m => m.id === payload.id);
            const existing = existingIndex >= 0 ? monitors[existingIndex] : null;
            const now = new Date().toISOString();
            const channels = (payload.channels || []).map(ch => {
              const prev = existing && Array.isArray(existing.channels)
                ? existing.channels.find(c => c.platform === ch.platform)
                : null;
              return {
                platform: ch.platform,
                userId: ch.userId || (prev && prev.userId) || null,
                sessionToken: ch.sessionToken || (prev && prev.sessionToken) || null,
                chatId: ch.chatId || (prev && prev.chatId) || null,
                channelId: ch.channelId || (prev && prev.channelId) || null,
                verified: Boolean(prev && prev.verified)
              };
            });

            const newMonitor = {
              id: payload.id,
              site: payload.site,
              goal: payload.goal,
              sessionToken: payload.sessionToken || (existing && existing.sessionToken) || null,
              active: true,
              verified: existing ? Boolean(existing.verified) : false,
              createdAt: existing && existing.createdAt ? existing.createdAt : now,
              updatedAt: now,
              channels
            };

            if (existingIndex >= 0) {
              monitors[existingIndex] = newMonitor;
              console.log('Updated existing monitor:', payload.id);
            } else {
              monitors.push(newMonitor);
              console.log('Added monitor:', payload.id);
            }

          } else if (action === 'verify') {
            const monitor = monitors.find(m => m.id === payload.id);
            if (!monitor) {
              throw new Error('Monitor not found: ' + payload.id);
            }
            if (!Array.isArray(monitor.channels)) {
              throw new Error('Monitor has no channels: ' + payload.id);
            }

            const ch = monitor.channels.find(c => c.platform === payload.platform);
            if (!ch) {
              throw new Error('Channel not found for platform: ' + payload.platform);
            }

            if (payload.platform === 'telegram' && !ch.chatId) {
              throw new Error('Telegram chatId missing. Ask user to tap Start bot first.');
            }
            if (payload.platform === 'discord' && !ch.channelId) {
              throw new Error('Discord channelId missing. Send Discord test first.');
            }

            ch.verified = true;
            ch.verifiedAt = new Date().toISOString();
            monitor.verified = monitor.channels.every(c => c.verified);
            monitor.lastVerifiedPlatform = payload.platform;
            monitor.updatedAt = new Date().toISOString();
            if (monitor.verified) {
              monitor.verifiedAt = new Date().toISOString();
            }
            console.log('Verified channel:', payload.platform, 'for', payload.id);

          } else if (action === 'deactivate') {
            const monitor = monitors.find(m => m.id === payload.id);
            if (!monitor) {
              throw new Error('Monitor not found: ' + payload.id);
            }
            monitor.active = false;
            console.log('Deactivated:', payload.id);

          } else {
            throw new Error('Unknown action: ' + action);
          }

          fs.writeFileSync('monitors.json', JSON.stringify(monitors, null, 2));
          "

      - name: Commit changes
        run: |
          git config user.name "GoalWatch Bot"
          git config user.email "goalwatch-bot@users.noreply.github.com"
          git add monitors.json
          git diff --staged --quiet || git commit -m "feat: monitor update (${{ inputs.action }}) [skip ci]"
          git push
