name: GoalWatch - Daily Check

on:
  schedule:
    - cron: "30 3 * * *" # 9:00 AM IST
  workflow_dispatch:

jobs:
  check-goals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure state file exists
        run: |
          test -f state.json || echo "{}" > state.json
          test -f monitors.json || echo "[]" > monitors.json

      - name: Run goal checker
        run: node scripts/check-goals.js

      - name: Commit updated state
        run: |
          git config user.name "GoalWatch Bot"
          git config user.email "goalwatch-bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update goal state [skip ci]"
          git push
