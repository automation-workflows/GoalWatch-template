name: Telegram Intake

on:
  schedule:
    - cron: "*/15 * * * *"  # Every 15 minutes
  workflow_dispatch:

jobs:
  intake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure data files exist
        run: |
          test -f monitors.json || echo "[]" > monitors.json
          test -f state.json || echo "{}" > state.json

      - name: Poll Telegram for /start messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/telegram-intake.js

      - name: Commit changes if any
        run: |
          git config user.name "GoalWatch Bot"
          git config user.email "goalwatch-bot@users.noreply.github.com"
          git add monitors.json state.json
          git diff --staged --quiet || git commit -m "chore: telegram intake update [skip ci]"
          git push
