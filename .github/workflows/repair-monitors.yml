name: GoalWatch - Repair Monitors

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing changes"
        required: false
        default: "false"

jobs:
  repair:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure monitors.json exists
        run: |
          test -f monitors.json || echo "[]" > monitors.json

      - name: Repair monitor verification fields
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/repair-monitors.js --dry-run
          else
            node scripts/repair-monitors.js
          fi

      - name: Commit changes if any
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "GoalWatch Bot"
          git config user.email "goalwatch-bot@users.noreply.github.com"
          git add monitors.json
          git diff --staged --quiet || git commit -m "chore: repair monitor verification fields [skip ci]"
          git push
